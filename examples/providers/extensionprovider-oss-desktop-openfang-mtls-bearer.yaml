apiVersion: controlplane.epydios.ai/v1alpha1
kind: ExtensionProvider
metadata:
  name: oss-desktop-openfang-linux-secure
  namespace: epydios-system
spec:
  providerType: DesktopProvider
  providerId: oss-desktop-openfang-linux
  contractVersion: v1alpha1
  endpoint:
    url: https://openfang-provider.epydios-system.svc.cluster.local:8443
    timeoutSeconds: 10
    healthPath: /healthz
    capabilitiesPath: /v1alpha1/capabilities
  auth:
    mode: MTLSAndBearerTokenSecret
    bearerTokenSecretRef:
      name: openfang-desktop-provider-auth
      key: token
    clientTLSSecretRef:
      name: epydios-control-plane-client-tls
    caSecretRef:
      name: openfang-desktop-provider-ca
  selection:
    enabled: false
    priority: 70
  advertisedCapabilities:
    - observe.window_metadata
    - observe.screenshot_hash
    - actuate.window_focus
    - actuate.input.type_click
    - verify.post_action_state
  annotations:
    epydios.ai/desktop-autonomy-profile: sandbox_vm_autonomous
    epydios.ai/restricted-host-policy: blocked-by-default
    epydios.ai/activation: enable after sandbox conformance evidence
