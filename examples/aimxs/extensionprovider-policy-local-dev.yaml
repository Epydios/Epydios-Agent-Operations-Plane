apiVersion: controlplane.epydios.ai/v1alpha1
kind: ExtensionProvider
metadata:
  name: aimxs-policy-local-dev
  namespace: epydios-system
  labels:
    aimxs.epydios.ai/profile: local-dev
spec:
  providerId: aimxs-policy-local-dev
  providerType: PolicyProvider
  contractVersion: v1alpha1
  advertisedCapabilities:
    - policy.evaluate
    - policy.validate_bundle
  endpoint:
    # Dev loopback target. This points at the OSS OPA policy provider service
    # so teams can validate AIMXS contract switching before private AIMXS is live.
    url: http://epydios-oss-policy-provider.epydios-system.svc.cluster.local:8080
    healthPath: /healthz
    capabilitiesPath: /v1alpha1/capabilities
    timeoutSeconds: 5
  auth:
    mode: None
  selection:
    # Keep disabled by default so baseline OSS routing is unchanged until explicitly enabled.
    enabled: false
    priority: 850
