apiVersion: v1
kind: ConfigMap
metadata:
  name: epydios-oss-desktop-provider-config
data:
  config.json: |
    {
      "providerId": "oss-desktop-linux",
      "providerVersion": "0.2.0",
      "targetOS": "linux",
      "capabilities": [
        "observe.window_metadata",
        "observe.screenshot_hash",
        "actuate.window_focus",
        "actuate.input.type_click",
        "verify.post_action_state"
      ]
    }
