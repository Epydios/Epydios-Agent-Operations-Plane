apiVersion: controlplane.epydios.ai/v1alpha1
kind: ExtensionProvider
metadata:
  name: aimxs-policy-primary
  labels:
    epydios.ai/deployment-mode: aimxs-hosted
spec:
  providerType: PolicyProvider
  providerId: aimxs-policy-primary
  contractVersion: v1alpha1
  endpoint:
    url: https://aimxs-policy-hosted.epydios.com
    healthPath: /healthz
    capabilitiesPath: /v1alpha1/capabilities
    timeoutSeconds: 10
  auth:
    mode: MTLSAndBearerTokenSecret
    bearerTokenSecretRef:
      name: aimxs-policy-token
      key: token
    clientTLSSecretRef:
      name: epydios-controller-mtls-client
    caSecretRef:
      name: epydios-provider-ca
  selection:
    enabled: true
    priority: 900
  advertisedCapabilities:
    - policy.evaluate
    - policy.validate_bundle
    - governance.handshake_validation
    - evidence.policy_decision_refs
