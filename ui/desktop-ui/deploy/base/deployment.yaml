apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentops-desktop
  labels:
    app.kubernetes.io/name: agentops-desktop
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: epydios-agentops-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentops-desktop
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentops-desktop
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: epydios-agentops-control-plane
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/epydios/epydios-agentops-desktop:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: runtime-config
              mountPath: /usr/share/nginx/html/config/runtime-config.json
              subPath: runtime-config.json
              readOnly: true
      volumes:
        - name: runtime-config
          configMap:
            name: agentops-desktop-runtime-config
